name: KMP CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: ./Saved

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run KtLint (Линтер)
        run: ./gradlew ktlintCheck --no-daemon

      - name: Build Android App (Сборка Android)
        run: ./gradlew assembleDebug --no-daemon

      - name: Build iOS Framework (Сборка iOS)
        run: ./gradlew assembleIosSimulatorArm64 --no-daemon